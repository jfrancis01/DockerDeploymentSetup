services:
  jenkins:
    build:
        dockerfile: Dockerfile.jenkins
    container_name: jenkins-server
    ports:
      - "9001:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # To build images within container
      - ./shared_data:/shared_data
    networks:
      - devops-net

  tomcat:
    build:
        dockerfile: Dockerfile.tomcat
    container_name: tomcat-server
    ports:
      - "9000:8080"
    networks:
      - devops-net
    depends_on:
      - jenkins
    volumes:
       - tomcat_webapps:/usr/local/tomcat/webapps

  mysql:
    image: mysql:latest
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: occassionsdb
    ports:
      - "3306:3306"
    networks:
        - devops-net
    volumes:
      - mysql-data:/var/lib/mysql

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.2
    extra_hosts:
      - "keycloak:127.0.0.1"
      - "nobara-pc:host-gateway"
    container_name: keycloak-container
    command: start-dev # Use 'start' for production with proper TLS
    environment:
      #KC_HOSTNAME: http://keycloak:8080
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    networks:
        - devops-net
    ports:
      - "8082:8080"
    depends_on:
      - db
  db:
    image: postgres:15
    container_name: postgres-container
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    networks:
        - devops-net
    volumes:
      - pgdata:/var/lib/postgresql/data

  nginx:
   #build:
   #dockerfile: Dockerfile.nginx
    container_name: nginx-server
    image: nginx:latest
    networks:
    - devops-net
    ports:
    - "4200:80" # Maps port 4200 on the host to port 80 in the container
    volumes:
      # Mounts the local 'html' directory to NGINX's default static content directory
     #- nginx_html:/home/joel/DockerDeploy_OccassionsREST/nginx_conf/html:/usr/share/nginx/html
      # Mounts a custom nginx.conf file to the container's main config file
     - nginx_conf:/home/joel/DockerDeploy_OccassionsREST/nginx_conf/nginx.conf:/etc/nginx/nginx.conf
     - ./shared_data/ocassion-reminder-app/browser:/usr/share/nginx/html
    restart: unless-stopped # Automatically restart the container unless manually stopped

volumes:
  pgdata:
  jenkins_home:
  mysql-data:
  tomcat_webapps:
  nginx_html:
  nginx_conf:
  shared_data:

networks:
  devops-net:
